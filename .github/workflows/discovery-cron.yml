name: Vellio — Prospection produits 19h

on:
  workflow_dispatch: # STANDBY — relancer manuellement quand Vellio sera prêt

jobs:
  discover:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Déclencher la prospection automatique
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://vellio-shop.vercel.app/api/cron/discover?secret=${{ secrets.CRON_SECRET }}")
          echo "Status HTTP: $response"
          if [ "$response" != "200" ]; then
            echo "Erreur: status $response"
            exit 1
          fi
          echo "Prospection lancée avec succès"
